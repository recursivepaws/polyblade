# See https://embarkstudios.github.io/cargo-deny/ for full documentation.

[graph]
all-features = true

[advisories]
version = 2
ignore = [
  # `paste` is unmaintained (no CVE), pulled in transitively via wgpu-hal's
  # macOS `metal` backend. No fix available upstream yet.
  "RUSTSEC-2024-0436",
]

[licenses]
version = 2
allow = [
  "AGPL-3.0-or-later",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "LGPL-2.1-or-later",
  "LGPL-3.0",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
