[package]
name = "polyblade"
version = "0.1.0"
authors = ["Vera Gonzalez <me@vera.lgbt>"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
log = { version = "0.4.27"}
# dioxus = { path = "../dioxus", features = ["gpu", "router", "fullstack"] }
dioxus = { git = "https://github.com/DioxusLabs/dioxus", rev = "7d24a47c2265e26ae1476fc27ac2d6746941a95a", features = ["router"] }
strum = "0.27"
strum_macros = "0.27"
ultraviolet = { version = "0.9.2", features = ["bytemuck"] }
bytemuck = { version = "1.23.0", features = ["derive"] }

wgpu = { version = "25.0.2" }

# Not for web

# Only for web
wasm-logger = { version = "0.2.0", optional = true }
color = { version = "0.3"}
web-sys = { version = "0.3.77", features = [
    "CanvasRenderingContext2d",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "Window",
], optional = true }

[features]
default = ["web", "webgpu"]
web = ["dioxus/web", "web-sys", "wasm-logger"]
desktop = ["dioxus/desktop"]
mobile = ["dioxus/mobile"]
native = ["dioxus/native"]
webgl = ["wgpu/webgl"]
webgpu = ["wgpu/webgpu"]

[profile]

[profile.wasm-dev]
inherits = "dev"
opt-level = 1

[profile.server-dev]
inherits = "dev"

[profile.android-dev]
inherits = "dev"
