name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_release:
        description: "Dry run: build the bundle matrix but skip creating the GitHub Release/tag"
        type: boolean
        default: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          set -euo pipefail
          current="$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            previous="$(git show HEAD^:Cargo.toml | grep -m1 '^version' | sed -E 's/version = "(.*)"/\1/' || true)"
          else
            previous=""
          fi
          echo "version=$current" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$previous" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  bundle:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            package_types: deb appimage
          - os: macos-latest
            platform: macos
            package_types: macos dmg
          - os: windows-latest
            platform: windows
            package_types: msi
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
      - name: regenerate tailwind CSS
        run: nix develop -c tailwindcss -i ./tailwind.css -o ./assets/tailwind.css --minify
      - if: matrix.platform == 'linux'
        name: install libfuse2 (AppImage runtime dependency)
        run: sudo apt-get update && sudo apt-get install -y libfuse2
      - name: dx bundle
        shell: bash
        run: |
          PKG_ARGS=""
          for t in ${{ matrix.package_types }}; do PKG_ARGS="$PKG_ARGS --package-types $t"; done
          nix develop -c dx bundle --platform ${{ matrix.platform }} --release $PKG_ARGS --out-dir dist
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: dist/**

  github-release:
    needs: [check-version, bundle]
    if: github.event_name == 'push' || github.event.inputs.skip_release != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: dist/**
